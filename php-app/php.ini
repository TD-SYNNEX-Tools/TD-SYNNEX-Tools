; -------------------------------------------------------
; Configuracao PHP para ArcCalculator / Analise Financeira Azure
; Use: php -c php.ini -S localhost:8000 -t public
; -------------------------------------------------------

; Diretorio das extensoes (XAMPP padrao). Ajuste se sua instalacao usar outro caminho.
extension_dir = "C:\xampp\php\ext"

; Extensoes obrigatorias para o app:
;  - mbstring : usado pelo PhpSpreadsheet (mb_strlen, etc.)
;  - openssl  : HTTPS (curl + API Microsoft)
;  - curl     : consulta API de pricing
;  - zip      : escrita de .xlsx (PhpSpreadsheet)
;  - gd       : manipulacao de imagens (logo no PDF/XLSX)
;  - fileinfo : detec. MIME nos uploads
extension=mbstring
extension=openssl
extension=curl
extension=zip
extension=gd
extension=fileinfo

; CA bundle: necessario para verificacao SSL (cURL + OpenSSL).
; Sem isto, requisicoes HTTPS para prices.azure.com falham com
; "self-signed certificate in certificate chain".
curl.cainfo     = "C:\xampp\apache\bin\curl-ca-bundle.crt"
openssl.cafile  = "C:\xampp\apache\bin\curl-ca-bundle.crt"

; Uploads / POST: arquivos CSV de Cost Management podem chegar a 200-500 MB
upload_max_filesize = 500M
post_max_size       = 510M

; Memoria: parse de CSV grande consome ~3-4x o tamanho do arquivo em RAM
memory_limit        = 4096M

; Tempo de execucao: analise + consulta a API de pricing pode demorar
max_execution_time  = 1800
max_input_time      = 1800

; Sessao: nao serializa o resultado gigante (offload em disco via cache)
session.gc_maxlifetime = 7200

; Realpath cache (acelera autoload com muitos require)
realpath_cache_size = 4096k
realpath_cache_ttl  = 600
